models:
  qwen3vl:
    - name: "Qwen3-VL-4B-Instruct"
      model_id: "Qwen/Qwen3-VL-4B-Instruct"
      type: "qwen3vl"
      max_pixels: 1280
      min_pixels: 256
    - name: "Qwen3-VL-8B-Instruct"
      model_id: "Qwen/Qwen3-VL-8B-Instruct"
      type: "qwen3vl"
      max_pixels: 1280
      min_pixels: 256
    - name: "Qwen3-VL-30B-A3B-Instruct"
      model_id: "Qwen/Qwen3-VL-30B-A3B-Instruct"
      type: "qwen3vl"
      max_pixels: 1280
      min_pixels: 256
    - name: "Qwen3-VL-235B-A22B-Instruct"
      model_id: "Qwen/Qwen3-VL-235B-A22B-Instruct"
      type: "qwen3vl"
      max_pixels: 1280
      min_pixels: 256
  
  # InternVL 3.5 Instruct (OpenGVLab) — GitHub format, trust_remote_code
  # https://huggingface.co/OpenGVLab/InternVL3_5-1B-Instruct
  internvl:
    - name: "InternVL3.5-1B-Instruct"
      model_id: "OpenGVLab/InternVL3_5-1B-Instruct"
      type: "internvl"
    - name: "InternVL3.5-2B-Instruct"
      model_id: "OpenGVLab/InternVL3_5-2B-Instruct"
      type: "internvl"
    - name: "InternVL3.5-4B-Instruct"
      model_id: "OpenGVLab/InternVL3_5-4B-Instruct"
      type: "internvl"
    - name: "InternVL3.5-8B-Instruct"
      model_id: "OpenGVLab/InternVL3_5-8B-Instruct"
      type: "internvl"
    - name: "InternVL3.5-14B-Instruct"
      model_id: "OpenGVLab/InternVL3_5-14B-Instruct"
      type: "internvl"
    - name: "InternVL3.5-30B-A3B-Instruct (31B)"
      model_id: "OpenGVLab/InternVL3_5-30B-A3B-Instruct"
      type: "internvl"
    - name: "InternVL3.5-38B-Instruct"
      model_id: "OpenGVLab/InternVL3_5-38B-Instruct"
      type: "internvl"
    - name: "InternVL3.5-241B-A28B-Instruct"
      model_id: "OpenGVLab/InternVL3_5-241B-A28B-Instruct"
      type: "internvl"

  # GLM-OCR (Z.ai) — https://huggingface.co/zai-org/GLM-OCR — 0.9B, document OCR
  glm_ocr:
    - name: "GLM-OCR"
      model_id: "zai-org/GLM-OCR"
      type: "glm_ocr"

  # OCRFlux-3B (ChatDOC) — Qwen2.5-VL based, markdown output
  # https://huggingface.co/ChatDOC/OCRFlux-3B
  ocrflux:
    - name: "OCRFlux-3B"
      model_id: "ChatDOC/OCRFlux-3B"
      type: "ocrflux"
      max_pixels: 1280
      min_pixels: 256

inference:
  batch_size: 1
  max_new_tokens: 2048
  temperature: 0.1
  top_p: 0.9
  # torch.compile reduces Python overhead (PyTorch 2.0+). First run is slower (compilation).
  use_torch_compile: true

device:
  use_multi_gpu: true
  device_map: "auto"
  gpu_memory_utilization: 0.9
  
ocr:
  output_format: "markdown"
  dpi: 300
  # When "Resize high-resolution" is checked, images with longest side above this are resized (keeps aspect ratio)
  max_image_size: 1536
  image_quality: 95

